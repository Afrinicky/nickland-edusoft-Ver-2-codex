# Nickland Edusoft — Windows .exe builder
# Runs on every push to main + on every tag matching v*
# Output: a Windows installer (.exe) + portable build, attached to a GitHub Release
name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:  # adds a "Run workflow" button in the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python (needed by native node modules)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Package Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: dir dist-app
        shell: cmd

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nickland-edusoft-windows
          path: |
            dist-app/*.exe
            dist-app/*.blockmap
            dist-app/latest.yml
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release (only on tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-app/*.exe
            dist-app/*.blockmap
            dist-app/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
